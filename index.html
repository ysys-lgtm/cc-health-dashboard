<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC 스킬 현황 · Finito</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--dim:#94a3b8;--bright:#f8fafc;--blue:#3b82f6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--cyan:#06b6d4;--pink:#ec4899}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding:24px;max-width:1200px;margin:0 auto}

/* 헤더 */
header{text-align:center;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border);animation:fadeDown .6s ease}
header h1{font-size:1.6rem;font-weight:800;color:var(--bright);letter-spacing:-.02em}
header .sub{color:var(--dim);font-size:.8rem;margin-top:6px}

/* 상단 통계 카드 */
.top-stats{display:flex;gap:12px;margin-bottom:24px}
.stat-pill{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;cursor:default;transition:transform .2s,border-color .2s;animation:fadeUp .5s ease both}
.stat-pill:hover{transform:translateY(-3px);border-color:var(--blue)}
.stat-pill .v{font-size:2rem;font-weight:800;color:var(--bright)}
.stat-pill .l{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.stat-pill:nth-child(1){animation-delay:.1s}.stat-pill:nth-child(2){animation-delay:.15s}.stat-pill:nth-child(3){animation-delay:.2s}.stat-pill:nth-child(4){animation-delay:.25s}.stat-pill:nth-child(5){animation-delay:.3s}

/* 탭 네비게이션 */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border);padding-bottom:0;flex-wrap:wrap}
.tab{padding:10px 18px;font-size:.82rem;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;user-select:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab .badge{background:var(--border);color:var(--bright);padding:1px 6px;border-radius:8px;font-size:.65rem;margin-left:6px}

/* 탭 패널 */
.panel{display:none;animation:fadeIn .3s ease}
.panel.active{display:block}

/* 카테고리 아코디언 */
.cat-group{margin-bottom:12px}
.cat-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:8px;cursor:pointer;transition:background .2s;user-select:none}
.cat-header:hover{background:rgba(255,255,255,.06)}
.cat-header .arrow{transition:transform .2s;font-size:.7rem;color:var(--dim)}
.cat-header.open .arrow{transform:rotate(90deg)}
.cat-header .cat-name{font-size:.8rem;font-weight:700;flex:1}
.cat-header .cat-count{font-size:.7rem;color:var(--dim)}
.cat-body{overflow:hidden;max-height:0;transition:max-height .3s ease}
.cat-body.open{max-height:2000px}

/* 스킬 카드 (그리드) */
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding:10px 0}
.skill-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.skill-card:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.skill-card .s-name{font-size:.88rem;font-weight:700;color:var(--bright)}
.skill-card .s-trigger{font-family:monospace;font-size:.68rem;color:var(--cyan);margin-top:2px}
.skill-card .s-desc{font-size:.75rem;color:var(--dim);margin-top:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.skill-card .s-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05)}
.skill-card .s-maker{font-size:.68rem;color:var(--dim)}
.skill-card .s-tag{padding:2px 7px;border-radius:4px;font-size:.6rem;font-weight:700}
.s-tag.활성{background:rgba(16,185,129,.15);color:var(--green)}
.s-tag.신규{background:rgba(59,130,246,.15);color:var(--blue)}
.s-tag.안정{background:rgba(148,163,184,.15);color:var(--dim)}
.s-tag.방치{background:rgba(245,158,11,.15);color:var(--amber)}
.s-tag.죽음{background:rgba(239,68,68,.15);color:var(--red)}
.s-tag.팬텀{background:rgba(236,72,153,.15);color:var(--pink)}

/* 모달 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;animation:fadeIn .2s;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto;animation:slideUp .3s ease}
.modal .m-close{position:absolute;top:12px;right:16px;font-size:1.2rem;color:var(--dim);cursor:pointer;background:none;border:none;transition:color .2s}
.modal .m-close:hover{color:var(--bright)}
.modal h3{font-size:1.1rem;font-weight:800;color:var(--bright);margin-bottom:4px}
.modal .m-trigger{font-family:monospace;font-size:.8rem;color:var(--cyan);margin-bottom:12px}
.modal .m-desc{font-size:.85rem;color:var(--text);line-height:1.6;margin-bottom:16px}
.modal .m-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.modal .m-info-item{background:rgba(255,255,255,.03);border-radius:6px;padding:8px 10px}
.modal .m-info-item .label{font-size:.65rem;color:var(--dim);text-transform:uppercase}
.modal .m-info-item .value{font-size:.85rem;color:var(--bright);font-weight:600;margin-top:2px}

/* 합치기 제안 카드 */
.merge-card{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.merge-card:hover{border-color:var(--purple);transform:translateY(-2px)}
.merge-card h3{font-size:.88rem;font-weight:700;color:var(--purple);margin-bottom:4px}
.merge-card .m-summary{font-size:.78rem;color:var(--dim)}
.merge-card .m-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid rgba(139,92,246,.15);font-size:.78rem;color:var(--text);line-height:1.5}
.merge-card.open .m-detail{display:block}
.merge-card .m-skills{font-family:monospace;font-size:.72rem;color:var(--cyan);margin-top:6px}
.merge-card .m-reason{font-size:.72rem;color:var(--amber);margin-top:4px}

/* 정리/논의 아이템 */
.action-item{display:flex;align-items:flex-start;gap:12px;padding:12px;margin-bottom:8px;background:rgba(255,255,255,.02);border-radius:8px;transition:background .2s;cursor:default}
.action-item:hover{background:rgba(255,255,255,.05)}
.action-item .a-icon{font-size:1.3rem;min-width:32px;text-align:center;padding-top:2px}
.action-item .a-title{font-size:.82rem;font-weight:700;color:var(--bright)}
.action-item .a-desc{font-size:.75rem;color:var(--dim);margin-top:2px;line-height:1.4}

/* 팀 커버리지 */
.gap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.gap-card{background:rgba(255,255,255,.03);border-radius:10px;padding:14px;text-align:center;transition:transform .2s}
.gap-card:hover{transform:translateY(-2px)}
.gap-card .g-team{font-size:.72rem;color:var(--dim);font-weight:600}
.gap-card .g-num{font-size:2rem;font-weight:800;margin:4px 0}
.gap-card .g-owner{font-size:.65rem;color:var(--dim)}
.gap-card .g-status{font-size:.6rem;font-weight:700;margin-top:4px;padding:2px 6px;border-radius:3px;display:inline-block}
.gap-card.충분{border-top:3px solid var(--green)}.gap-card.충분 .g-status{background:rgba(16,185,129,.15);color:var(--green)}
.gap-card.부분{border-top:3px solid var(--amber)}.gap-card.부분 .g-status{background:rgba(245,158,11,.15);color:var(--amber)}
.gap-card.부족{border-top:3px solid var(--pink)}.gap-card.부족 .g-status{background:rgba(236,72,153,.15);color:var(--pink)}
.gap-card.없음{border-top:3px solid var(--red)}.gap-card.없음 .g-status{background:rgba(239,68,68,.15);color:var(--red)}

/* 기여자 테이블 */
.author-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.author-table th{text-align:left;font-size:.7rem;color:var(--dim);text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--border)}
.author-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.03);font-size:.82rem}
.author-table tr:hover td{background:rgba(255,255,255,.03)}
.bf-badge{padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:700}
.bf-badge.CRITICAL{background:rgba(239,68,68,.15);color:var(--red)}
.bf-badge.HIGH{background:rgba(245,158,11,.15);color:var(--amber)}
.bf-badge.OK{background:rgba(16,185,129,.15);color:var(--green)}
.section-title{font-size:.95rem;font-weight:700;color:var(--bright);margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* 검색/필터 */
.search-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.82rem;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--cyan)}
.search-input::placeholder{color:var(--dim)}
.filter-btn{padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:.72rem;cursor:pointer;transition:all .2s;user-select:none}
.filter-btn:hover,.filter-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(6,182,212,.08)}

footer{text-align:center;margin-top:24px;font-size:.65rem;color:var(--dim);opacity:.4}

/* 애니메이션 */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.top-stats{flex-wrap:wrap}.skill-grid{grid-template-columns:1fr}.tabs{overflow-x:auto}}
</style>
</head>

function showModal(skill){
  if(!skill) return;
  const m=document.getElementById('modal-body');
  m.innerHTML='<h3>'+skill.name+'</h3>'+
    '<div class="m-trigger">'+skill.trigger+'</div>'+
    '<div class="m-desc">'+skill.detail+'</div>'+
    '<div class="m-info">'+
      '<div class="m-info-item"><div class="label">분류</div><div class="value">'+skill.cat+'</div></div>'+
      '<div class="m-info-item"><div class="label">상태</div><div class="value">'+skill.status+'</div></div>'+
      '<div class="m-info-item"><div class="label">만든 사람</div><div class="value">'+skill.maker+'</div></div>'+
      '<div class="m-info-item"><div class="label">커밋 수</div><div class="value">'+skill.commits+'</div></div>'+
      '<div class="m-info-item"><div class="label">줄 수</div><div class="value">'+skill.lines+'</div></div>'+
      '<div class="m-info-item"><div class="label">스크립트</div><div class="value">'+skill.scripts+'</div></div>'+
      '<div class="m-info-item"><div class="label">MCP 연동</div><div class="value">'+skill.mcp+'</div></div>'+
      '<div class="m-info-item"><div class="label">생성일</div><div class="value">'+skill.created+'</div></div>'+
      '<div class="m-info-item"><div class="label">최근 업데이트</div><div class="value">'+skill.modified+'</div></div>'+
      '<div class="m-info-item"><div class="label">설명</div><div class="value">'+skill.desc+'</div></div>'+
    '</div>';
  document.getElementById('modal-overlay').classList.add('show');
}

// 카탈로그 탭 — 검색/필터 포함
(function(){
  const searchHtml='<div class="search-bar">'+
    '<input class="search-input" id="skill-search" placeholder="스킬 검색 (이름, 설명, 트리거...)" />'+
    '<button class="filter-btn active" data-filter="all">전체</button>'+
    '<button class="filter-btn" data-filter="활성">활성</button>'+
    '<button class="filter-btn" data-filter="신규">신규</button>'+
    '<button class="filter-btn" data-filter="안정">안정</button>'+
    '<button class="filter-btn" data-filter="방치">방치</button>'+
    '<button class="filter-btn" data-filter="죽음">정리필요</button>'+
    '</div>';

  function renderCatalog(filter, query){
    const cats=[...new Set(SKILLS.map(s=>s.cat))];
    let html='';
    cats.forEach(cat=>{
      let items=SKILLS.filter(s=>s.cat===cat);
      if(filter!=='all') items=items.filter(s=>s.status===filter);
      if(query) items=items.filter(s=>
        s.name.toLowerCase().includes(query)||
        s.desc.toLowerCase().includes(query)||
        s.trigger.toLowerCase().includes(query)||
        s.maker.toLowerCase().includes(query)
      );
      if(items.length===0) return;
      const color=items[0].catColor;
      html+='<div class="cat-group"><div class="cat-header open" style="border-left:3px solid '+color+'" onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'open\')">'+
        '<span class="arrow">▶</span><span class="cat-name" style="color:'+color+'">'+cat+'</span>'+
        '<span class="cat-count">'+items.length+'개</span></div>'+
        '<div class="cat-body open"><div class="skill-grid">';
      items.forEach((s,i)=>{
        html+='<div class="skill-card" style="animation:fadeUp .4s ease '+(i*0.05)+'s both" onclick=\'showModal(SKILLS['+SKILLS.indexOf(s)+'])\'>'+
          '<div class="s-name">'+s.name+'</div>'+
          '<div class="s-trigger">'+s.trigger+'</div>'+
          '<div class="s-desc">'+s.desc+'</div>'+
          '<div class="s-bottom"><span class="s-maker">'+s.maker+' · '+s.modified+'</span><span class="s-tag '+s.status+'">'+s.status+'</span></div></div>';
      });
      html+='</div></div></div>';
    });
    if(!html) html='<div style="color:var(--dim);padding:20px;text-align:center">조건에 맞는 스킬 없음</div>';
    return html;
  }

  const panel=document.getElementById('panel-catalog');
  panel.innerHTML=searchHtml+'<div id="catalog-content">'+renderCatalog('all','')+'</div>';

  let currentFilter='all';
  document.getElementById('skill-search').addEventListener('input',function(){
    document.getElementById('catalog-content').innerHTML=renderCatalog(currentFilter,this.value.toLowerCase());
  });
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      currentFilter=this.dataset.filter;
      const query=document.getElementById('skill-search').value.toLowerCase();
      document.getElementById('catalog-content').innerHTML=renderCatalog(currentFilter,query);
    });
  });
})();

// 합칠 것 탭
(function(){
  let html='';
  if(MERGES.length===0){html='<div style="color:var(--dim);padding:20px;text-align:center">합칠 후보 없음</div>';}
  MERGES.forEach(m=>{
    const skillList=Array.isArray(m.skills)?m.skills.join(', '):m.skills;
    html+='<div class="merge-card" onclick="this.classList.toggle(\'open\')">'+
      '<h3>'+m.title+'</h3><div class="m-summary">'+m.summary+'</div>'+
      '<div class="m-detail"><p>'+m.detail+'</p><div class="m-skills">'+skillList+'</div><div class="m-reason">→ '+m.reason+'</div></div></div>';
  });
  document.getElementById('panel-merge').innerHTML=html;
})();

// 정리할 것 탭
(function(){

  });

})();

// 빠진 영역 탭
(function(){
  let html='<div class="gap-grid">';
  GAPS.forEach(g=>{
    const numColor=g.count===0?'var(--red)':g.count>=5?'var(--green)':'var(--amber)';
    html+='<div class="gap-card '+g.status+'"><div class="g-team">'+g.team+'</div><div class="g-num" style="color:'+numColor+'">'+g.count+'</div><div class="g-owner">'+g.owner+'</div><div class="g-status">'+g.status+'</div></div>';
  });
  html+='</div>';
  document.getElementById('panel-gaps').innerHTML=html;
})();

// 기여자 탭
(function(){
  let html='<div class="section-title">기여자 맵</div>';
  if(AUTHORS.length===0){
    html+='<div style="color:var(--dim);padding:20px;text-align:center">기여자 데이터 없음</div>';
  } else {
    html+='<table class="author-table"><thead><tr><th>이름</th><th>스킬 수</th><th>커밋</th><th>마지막 활동</th><th>Top 스킬</th></tr></thead><tbody>';
    AUTHORS.forEach(a=>{
      const nameColor=a.skills===0?'color:var(--red)':'';
      html+='<tr><td style="font-weight:700;'+nameColor+'">'+a.name+'</td><td>'+a.skills+'</td><td>'+a.commits+'</td><td>'+a.lastActive+'</td><td style="font-family:monospace;font-size:.75rem;color:var(--cyan)">'+a.topSkill+'</td></tr>';
    });
    html+='</tbody></table>';
  }

  html+='<div class="section-title">Bus Factor 리스크</div>';
  if(BUS_FACTOR.length===0){
    html+='<div style="color:var(--green);padding:12px">모든 스킬에 2명 이상 기여 ✨</div>';
  } else {
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px">';
    BUS_FACTOR.forEach(b=>{
      html+='<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center">'+
        '<div><div style="font-weight:700;font-size:.85rem">'+b.skill+'</div><div style="font-size:.7rem;color:var(--dim)">owner: '+b.owner+'</div></div>'+
        '<span class="bf-badge '+b.risk+'">'+b.risk+'</span></div>';
    });
    html+='</div>';
  }
  document.getElementById('panel-authors').innerHTML=html;
})();

// 의존성 그래프 탭
(function(){
  if(DEPS.length===0){
    document.getElementById('panel-deps').innerHTML='<div style="color:var(--dim);padding:20px;text-align:center">감지된 의존성 없음</div>';
    return;
  }

  const nodeSet=new Set();
  DEPS.forEach(d=>{nodeSet.add(d.from);nodeSet.add(d.to);});
  const nodes=[...nodeSet];

  const W=1100, H=Math.max(400, nodes.length*50);
  const cx=W/2, cy=H/2;
  const pos={};
  nodes.forEach((n,i)=>{
    const angle=(2*Math.PI*i)/nodes.length;
    const r=Math.min(W,H)*0.35;
    pos[n]={x:cx+r*Math.cos(angle), y:cy+r*Math.sin(angle)};
  });

  function nodeColor(name){
    const s=SKILLS.find(sk=>sk.name===name);
    return s?s.catColor:'var(--dim)';
  }

  let svg='<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="background:rgba(0,0,0,.2);border-radius:12px;margin-top:8px">';
  svg+='<defs><marker id="arrow" viewBox="0 0 10 10" refX="20" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker></defs>';

  DEPS.forEach(d=>{
    const from=pos[d.from], to=pos[d.to];
    if(from&&to){
      svg+='<line x1="'+from.x+'" y1="'+from.y+'" x2="'+to.x+'" y2="'+to.y+'" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)" opacity=".6"/>';
    }
  });

  nodes.forEach(n=>{
    const p=pos[n];
    const color=nodeColor(n);
    const skillObj=SKILLS.find(s=>s.name===n);
    const onclick=skillObj?'showModal(SKILLS['+SKILLS.indexOf(skillObj)+'])':'';
    svg+='<g style="cursor:pointer" onclick="'+onclick+'">' +
      '<circle cx="'+p.x+'" cy="'+p.y+'" r="18" fill="#1e293b" stroke="'+color+'" stroke-width="2"/>'+
      '<text x="'+p.x+'" y="'+(p.y+32)+'" text-anchor="middle" font-size="11" fill="'+color+'" font-weight="600">'+n+'</text>'+
      '</g>';
  });

  svg+='</svg>';

  let list='<div class="section-title" style="margin-top:16px">의존성 목록 ('+DEPS.length+'건)</div>';
  DEPS.forEach(d=>{
    list+='<div style="padding:6px 12px;font-size:.8rem"><span style="color:var(--cyan);font-weight:700">'+d.from+'</span> <span style="color:var(--dim)">→</span> <span style="color:var(--bright)">'+d.to+'</span></div>';
  });

  document.getElementById('panel-deps').innerHTML=svg+list;
})();

// 논의할 것 탭
(function(){
  let html='';
  if(DISCUSSES.length===0){html='<div style="color:var(--dim);padding:20px;text-align:center">논의 항목 없음</div>';}
  DISCUSSES.forEach(d=>{
    html+='<div class="action-item"><span class="a-icon">'+d.icon+'</span><div><div class="a-title">'+d.title+'</div><div class="a-desc">'+d.desc+'</div></div></div>';
  });
  document.getElementById('panel-discuss').innerHTML=html;
})();
</script>
<div id="auth-gate" style="position:fixed;inset:0;background:#0f172a;z-index:9999;display:flex;align-items:center;justify-content:center">
<div style="text-align:center;font-family:-apple-system,system-ui,sans-serif;color:#e2e8f0">
<h2 style="font-size:1.4rem;margin-bottom:16px">CC 스킬 현황판</h2>
<p style="color:#94a3b8;font-size:.85rem;margin-bottom:12px">Finito 매니저 전용</p>
<input id="pw" type="password" placeholder="비밀번호 입력" style="padding:10px 16px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:.9rem;width:200px;outline:none" onkeydown="if(event.key==='Enter')checkPw()">
<button onclick="checkPw()" style="margin-left:8px;padding:10px 20px;border-radius:8px;border:none;background:#3b82f6;color:#fff;font-size:.9rem;cursor:pointer">확인</button>
<p id="pw-err" style="color:#ef4444;font-size:.8rem;margin-top:8px;display:none">비밀번호가 틀렸습니다</p>
</div></div>
<script>
function checkPw(){var p=document.getElementById('pw').value;if(btoa(p)==='ZmluaXRvMTEx'){document.getElementById('auth-gate').remove();sessionStorage.setItem('cc-auth','1')}else{document.getElementById('pw-err').style.display='block'}}
if(sessionStorage.getItem('cc-auth')==='1'){document.addEventListener('DOMContentLoaded',function(){var g=document.getElementById('auth-gate');if(g)g.remove()})}
</script>
</body>
